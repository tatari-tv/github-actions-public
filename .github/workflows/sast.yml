name: SAST (audit)

# Reusable SAST workflow: Semgrep (code) + Checkov (IaC) + Trivy (deps/containers).
# Extracted verbatim from clyde's repo-local sast.yml so all public Rust repos
# share ONE definition (see tatari-tv/github-actions-public,
# docs/design/2026-07-10-public-rust-ci-fleet-migration.md). Part of the Tatari
# org SAST rollout (tatari-tv/github-required-workflows,
# docs/design/2026-07-03-fleet-sast.md).
#
# Runs in AUDIT mode: every job carries continue-on-error, so findings surface
# (checks step-summary + SARIF artifact) but never block a merge. Uses only
# public actions (no internal-action dep) and only `contents: read`, so it runs
# safely on public fork PRs (a read-only fork token still uploads artifacts).
# Findings surface on the run, NOT the code-scanning tab (no codeql upload-sarif,
# so no security-events: write needed). Remove a job's `continue-on-error: true`
# to make it a hard gate.
#
# `on: workflow_call` -- the caller repo owns the `on: pull_request` trigger.
on:
  workflow_call:

permissions:
  contents: read

jobs:
  semgrep:
    name: SAST - Semgrep (code)
    runs-on: ubuntu-latest
    continue-on-error: true          # non-blocking; delete to gate
    timeout-minutes: 15
    steps:
      # Public checkout, not the internal tatari-tv/github-actions/checkout:
      # SAST only needs to read the source tree, and staying off the internal
      # action keeps this resolvable in ANY context (repo-local test CI or
      # org-injected required workflow) without depending on internal-action access.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Do not persist the job token in .git/config: this workflow scans
          # untrusted fork-PR content, so the checkout should leave no credentials
          # behind (matches rust-ci.yml). zizmor: artipacked.
          persist-credentials: false

      - name: Install Semgrep (OSS)
        run: pipx install semgrep

      - name: Scan
        run: |
          # Rulesets per design-review Q4: language packs in audit mode, p/secrets
          # OFF (gitleaks owns secrets). Prune per measured per-language FP rate.
          # A committed .semgrepignore should exclude vendored/generated/minified
          # paths to avoid hangs against the 15-min timeout.
          semgrep scan \
            --config p/default \
            --config p/python \
            --config p/javascript \
            --config p/typescript \
            --config p/react \
            --config p/rust \
            --sarif --output semgrep.sarif \
            --metrics=off

      - name: Render findings into the checks summary
        if: always()
        env:
          SARIF_FILE: semgrep.sarif
          TITLE: 'Semgrep (code SAST, non-blocking)'
        run: |
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json, os, pathlib, sys
          f, title = os.environ["SARIF_FILE"], os.environ["TITLE"]
          print(f"### Tatari Org SAST -- {title}\n")
          p = pathlib.Path(f)
          if not p.exists():
              print(":warning: no SARIF produced (scan did not complete)."); sys.exit(0)
          data = json.loads(p.read_text() or "{}")
          results = [r for run in data.get("runs", []) for r in run.get("results", [])]
          if not results:
              print(":white_check_mark: no findings."); sys.exit(0)
          print(f"**{len(results)} finding(s)** -- informational, does not block merge.\n")
          print("| Rule | Severity | File:Line | Message |"); print("|---|---|---|---|")
          for r in results[:100]:
              loc = (r.get("locations") or [{}])[0].get("physicalLocation", {})
              art = loc.get("artifactLocation", {}).get("uri", "?")
              line = loc.get("region", {}).get("startLine", "?")
              msg = (r.get("message", {}).get("text", "") or "").replace("|", "\\|")[:160]
              print(f"| `{r.get('ruleId','?')}` | {r.get('level','warning')} | {art}:{line} | {msg} |")
          if len(results) > 100:
              print(f"\n… and {len(results)-100} more (see the SARIF artifact).")
          PY

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          if-no-files-found: ignore

  checkov:
    name: SAST - Checkov (IaC)
    runs-on: ubuntu-latest
    continue-on-error: true          # non-blocking; delete to gate
    timeout-minutes: 15
    steps:
      # Public checkout, not the internal tatari-tv/github-actions/checkout:
      # SAST only needs to read the source tree, and staying off the internal
      # action keeps this resolvable in ANY context (repo-local test CI or
      # org-injected required workflow) without depending on internal-action access.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Do not persist the job token in .git/config: this workflow scans
          # untrusted fork-PR content, so the checkout should leave no credentials
          # behind (matches rust-ci.yml). zizmor: artipacked.
          persist-credentials: false

      # Required-workflow `on: paths:` filters are IGNORED, so skip at runtime:
      # only scan when the repo actually has IaC to scan.
      - name: Detect IaC files
        id: detect
        run: |
          if find . -path ./.git -prune -o \
              \( -name '*.tf' -o -name 'Chart.yaml' -o -name 'Dockerfile*' \
                 -o -path '*/templates/*.yaml' \) -print -quit | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No Terraform/Helm/Dockerfile found; skipping Checkov." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Install Checkov
        if: steps.detect.outputs.found == 'true'
        run: pipx install checkov

      - name: Scan
        if: steps.detect.outputs.found == 'true'
        run: checkov -d . -o sarif --output-file-path . --soft-fail

      - name: Render findings into the checks summary
        if: always() && steps.detect.outputs.found == 'true'
        env:
          SARIF_FILE: results_sarif.sarif
          TITLE: 'Checkov (IaC, non-blocking)'
        run: |
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json, os, pathlib, sys
          f, title = os.environ["SARIF_FILE"], os.environ["TITLE"]
          print(f"### Tatari Org SAST -- {title}\n")
          p = pathlib.Path(f)
          if not p.exists():
              print(":warning: no SARIF produced."); sys.exit(0)
          data = json.loads(p.read_text() or "{}")
          results = [r for run in data.get("runs", []) for r in run.get("results", [])]
          if not results:
              print(":white_check_mark: no findings."); sys.exit(0)
          print(f"**{len(results)} finding(s)** -- informational, does not block merge.\n")
          print("| Rule | Severity | File:Line | Message |"); print("|---|---|---|---|")
          for r in results[:100]:
              loc = (r.get("locations") or [{}])[0].get("physicalLocation", {})
              art = loc.get("artifactLocation", {}).get("uri", "?")
              line = loc.get("region", {}).get("startLine", "?")
              msg = (r.get("message", {}).get("text", "") or "").replace("|", "\\|")[:160]
              print(f"| `{r.get('ruleId','?')}` | {r.get('level','warning')} | {art}:{line} | {msg} |")
          if len(results) > 100:
              print(f"\n… and {len(results)-100} more (see the SARIF artifact).")
          PY

      - name: Upload SARIF artifact
        if: always() && steps.detect.outputs.found == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: checkov-sarif
          path: results_sarif.sarif
          if-no-files-found: ignore

  trivy:
    name: SAST - Trivy (deps/containers)
    runs-on: ubuntu-latest
    continue-on-error: true          # non-blocking; delete to gate
    timeout-minutes: 15
    steps:
      # Public checkout, not the internal tatari-tv/github-actions/checkout:
      # SAST only needs to read the source tree, and staying off the internal
      # action keeps this resolvable in ANY context (repo-local test CI or
      # org-injected required workflow) without depending on internal-action access.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Do not persist the job token in .git/config: this workflow scans
          # untrusted fork-PR content, so the checkout should leave no credentials
          # behind (matches rust-ci.yml). zizmor: artipacked.
          persist-credentials: false

      - name: Scan filesystem (vuln + misconfig; secrets OFF per Q5)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig
          format: sarif
          output: trivy.sarif
          exit-code: '0'            # never fail the step; audit mode

      - name: Render findings into the checks summary
        if: always()
        env:
          SARIF_FILE: trivy.sarif
          TITLE: 'Trivy (deps/containers, non-blocking)'
        run: |
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json, os, pathlib, sys
          f, title = os.environ["SARIF_FILE"], os.environ["TITLE"]
          print(f"### Tatari Org SAST -- {title}\n")
          p = pathlib.Path(f)
          if not p.exists():
              print(":warning: no SARIF produced."); sys.exit(0)
          data = json.loads(p.read_text() or "{}")
          results = [r for run in data.get("runs", []) for r in run.get("results", [])]
          if not results:
              print(":white_check_mark: no findings."); sys.exit(0)
          print(f"**{len(results)} finding(s)** -- informational, does not block merge.\n")
          print("| Rule | Severity | File:Line | Message |"); print("|---|---|---|---|")
          for r in results[:100]:
              loc = (r.get("locations") or [{}])[0].get("physicalLocation", {})
              art = loc.get("artifactLocation", {}).get("uri", "?")
              line = loc.get("region", {}).get("startLine", "?")
              msg = (r.get("message", {}).get("text", "") or "").replace("|", "\\|")[:160]
              print(f"| `{r.get('ruleId','?')}` | {r.get('level','warning')} | {art}:{line} | {msg} |")
          if len(results) > 100:
              print(f"\n… and {len(results)-100} more (see the SARIF artifact).")
          PY

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: trivy-sarif
          path: trivy.sarif
          if-no-files-found: ignore
