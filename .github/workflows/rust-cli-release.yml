name: rust-cli-release

# Reusable, tag-driven CLI release for Rust binaries. Extracted from the proven
# whitespace / aka REL-1 pattern (the self-contained 4-target matrix-tarball).
#
# It does ONE job: cross-compile the requested targets, tarball + sha256 each, and
# publish a GitHub Release. It does NOT build or push container images and does NOT
# deploy - those stay with the caller (docker-build.yml + a deploy dispatch). That
# keeps this reusable serving BOTH pure CLIs and the CLI half of a hybrid like
# marquee (which composes this + docker-build.yml itself).
#
# Why this is separate from platform-standard-ci: that workflow is a service-CD
# pipeline (debug test + release build + ECR push + deploy on main) and has zero
# CLI-distribution capability (no cross-compile, no macOS, no tarballs, no Release).
# This is the missing half of the org's Rust story.
#
# Linux and macOS are SEPARATE jobs (not one matrix with a conditional container):
# build-linux runs in debian:bookworm, build-macos on the macos-14 host. setup
# splits the requested targets into per-OS matrices and emits has-linux / has-macos
# so a single-OS subset skips the other job cleanly.
#
# The CALLER owns the trigger. Typical caller:
#   on: { push: { tags: ['v*'] }, workflow_dispatch: {} }

on:
  workflow_call:
    inputs:
      bin-names:
        description: >-
          Space-separated workspace binaries to ship in the tarball (default: repo
          name). Multi-binary workspaces list all, e.g. 'clone reposlug stale-branches'.
        required: false
        type: string
        default: ""
      archive-prefix:
        description: "Tarball name prefix (default: repo name). Files: <prefix>-<tag>-<suffix>.tar.gz(.sha256)."
        required: false
        type: string
        default: ""
      targets:
        description: "Space-separated target suffixes. Any of: linux-amd64 linux-arm64 macos-x86_64 macos-arm64."
        required: false
        type: string
        default: "linux-amd64 linux-arm64 macos-x86_64 macos-arm64"
      rust-version:
        description: "Rust toolchain version."
        required: false
        type: string
        default: "1.96.0"
      extra-files:
        description: "Space-separated extra files (repo-relative) to include in every tarball, e.g. shell completions."
        required: false
        type: string
        default: ""
      private-deps:
        description: >-
          Enable private git dependency fetching (CARGO_NET_GIT_FETCH_WITH_CLI +
          insteadOf token). Requires the private-deps-token secret.
        required: false
        type: boolean
        default: false
    secrets:
      private-deps-token:
        description: "Token for private git deps (used when private-deps=true)."
        required: false

permissions:
  contents: read

jobs:
  setup:
    name: Resolve targets
    runs-on: ubuntu-latest
    outputs:
      linux-matrix: ${{ steps.m.outputs.linux-matrix }}
      macos-matrix: ${{ steps.m.outputs.macos-matrix }}
      has-linux: ${{ steps.m.outputs.has-linux }}
      has-macos: ${{ steps.m.outputs.has-macos }}
      prefix: ${{ steps.m.outputs.prefix }}
      bins: ${{ steps.m.outputs.bins }}
    steps:
      - id: m
        shell: bash
        env:
          TARGETS: ${{ inputs.targets }}
          PREFIX: ${{ inputs.archive-prefix }}
          BINS: ${{ inputs.bin-names }}
          REPO: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          prefix="${PREFIX:-$REPO}"
          bins="${BINS:-$REPO}"
          # Split requested suffixes into per-OS matrices. Linux entries carry the
          # cross flag (arm64 needs the gcc-aarch64 linker); macOS entries do not.
          linux='[]'
          macos='[]'
          for s in $TARGETS; do
            case "$s" in
              linux-amd64)  os=linux; e='{"suffix":"linux-amd64","target":"x86_64-unknown-linux-gnu","cross":false}' ;;
              linux-arm64)  os=linux; e='{"suffix":"linux-arm64","target":"aarch64-unknown-linux-gnu","cross":true}' ;;
              macos-x86_64) os=macos; e='{"suffix":"macos-x86_64","target":"x86_64-apple-darwin"}' ;;
              macos-arm64)  os=macos; e='{"suffix":"macos-arm64","target":"aarch64-apple-darwin"}' ;;
              *) echo "::error::unknown target suffix '$s' (want: linux-amd64 linux-arm64 macos-x86_64 macos-arm64)"; exit 1 ;;
            esac
            if [ "$os" = linux ]; then
              linux=$(echo "$linux" | jq -c --argjson e "$e" '. + [$e]')
            else
              macos=$(echo "$macos" | jq -c --argjson e "$e" '. + [$e]')
            fi
          done
          nlinux=$(echo "$linux" | jq 'length')
          nmacos=$(echo "$macos" | jq 'length')
          [ $((nlinux + nmacos)) -gt 0 ] || { echo "::error::no targets resolved"; exit 1; }
          {
            echo "linux-matrix={\"include\":$linux}"
            echo "macos-matrix={\"include\":$macos}"
            echo "has-linux=$([ "$nlinux" -gt 0 ] && echo true || echo false)"
            echo "has-macos=$([ "$nmacos" -gt 0 ] && echo true || echo false)"
            echo "prefix=$prefix"
            echo "bins=$bins"
          } >> "$GITHUB_OUTPUT"

  build-linux:
    name: Build ${{ matrix.suffix }}
    needs: setup
    if: ${{ needs.setup.outputs.has-linux == 'true' }}
    runs-on: ubuntu-latest
    container: debian:bookworm
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.linux-matrix) }}
    steps:
      - name: Install build deps
        run: |
          apt-get update
          apt-get install -y curl build-essential git pkg-config libssl-dev

      - name: Install cross toolchain (arm64)
        if: matrix.cross
        run: apt-get install -y gcc-aarch64-linux-gnu

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Mark workspace safe for git (container)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Configure private git deps
        if: ${{ inputs.private-deps }}
        run: git config --global url."https://x-access-token:${{ secrets.private-deps-token }}@github.com/".insteadOf "https://github.com/"

      - name: Set GIT_DESCRIBE
        run: echo "GIT_DESCRIBE=$(git describe --tags --dirty --always)" >> "$GITHUB_ENV"

      - name: Set up Rust
        env:
          RUST_VERSION: ${{ inputs.rust-version }}
          TARGET: ${{ matrix.target }}
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$RUST_VERSION"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          . "$HOME/.cargo/env"
          rustup target add "$TARGET"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          prefix-key: "v1-rust"
          shared-key: ${{ matrix.target }}

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross && 'aarch64-linux-gnu-gcc' || '' }}
          CARGO_NET_GIT_FETCH_WITH_CLI: ${{ inputs.private-deps }}
          TARGET: ${{ matrix.target }}
        run: cargo build --release --target "$TARGET"

      - name: Package tarball
        shell: bash
        env:
          PREFIX: ${{ needs.setup.outputs.prefix }}
          BINS: ${{ needs.setup.outputs.bins }}
          EXTRA: ${{ inputs.extra-files }}
          TARGET: ${{ matrix.target }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          files=()
          for b in $BINS; do cp "target/$TARGET/release/$b" artifacts/; files+=("$b"); done
          for f in $EXTRA; do cp "$f" "artifacts/$(basename "$f")"; files+=("$(basename "$f")"); done
          tar -czvf "${PREFIX}-${GITHUB_REF_NAME}-${SUFFIX}.tar.gz" -C artifacts "${files[@]}"

      - name: Generate checksum
        shell: bash
        env:
          PREFIX: ${{ needs.setup.outputs.prefix }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          set -euo pipefail
          f="${PREFIX}-${GITHUB_REF_NAME}-${SUFFIX}.tar.gz"
          if command -v sha256sum >/dev/null 2>&1; then sha256sum "$f" > "$f.sha256"; else shasum -a 256 "$f" > "$f.sha256"; fi

      - name: Upload tarball
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ needs.setup.outputs.prefix }}-${{ matrix.suffix }}
          path: |
            ${{ needs.setup.outputs.prefix }}-${{ github.ref_name }}-${{ matrix.suffix }}.tar.gz
            ${{ needs.setup.outputs.prefix }}-${{ github.ref_name }}-${{ matrix.suffix }}.tar.gz.sha256

  build-macos:
    name: Build ${{ matrix.suffix }}
    needs: setup
    if: ${{ needs.setup.outputs.has-macos == 'true' }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.macos-matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Configure private git deps
        if: ${{ inputs.private-deps }}
        run: git config --global url."https://x-access-token:${{ secrets.private-deps-token }}@github.com/".insteadOf "https://github.com/"

      - name: Set GIT_DESCRIBE
        run: echo "GIT_DESCRIBE=$(git describe --tags --dirty --always)" >> "$GITHUB_ENV"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ inputs.rust-version }}
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          prefix-key: "v1-rust"
          shared-key: ${{ matrix.target }}

      - name: Build
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: ${{ inputs.private-deps }}
          TARGET: ${{ matrix.target }}
        run: cargo build --release --target "$TARGET"

      - name: Package tarball
        shell: bash
        env:
          PREFIX: ${{ needs.setup.outputs.prefix }}
          BINS: ${{ needs.setup.outputs.bins }}
          EXTRA: ${{ inputs.extra-files }}
          TARGET: ${{ matrix.target }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          files=()
          for b in $BINS; do cp "target/$TARGET/release/$b" artifacts/; files+=("$b"); done
          for f in $EXTRA; do cp "$f" "artifacts/$(basename "$f")"; files+=("$(basename "$f")"); done
          tar -czvf "${PREFIX}-${GITHUB_REF_NAME}-${SUFFIX}.tar.gz" -C artifacts "${files[@]}"

      - name: Generate checksum
        shell: bash
        env:
          PREFIX: ${{ needs.setup.outputs.prefix }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          set -euo pipefail
          f="${PREFIX}-${GITHUB_REF_NAME}-${SUFFIX}.tar.gz"
          if command -v sha256sum >/dev/null 2>&1; then sha256sum "$f" > "$f.sha256"; else shasum -a 256 "$f" > "$f.sha256"; fi

      - name: Upload tarball
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ needs.setup.outputs.prefix }}-${{ matrix.suffix }}
          path: |
            ${{ needs.setup.outputs.prefix }}-${{ github.ref_name }}-${{ matrix.suffix }}.tar.gz
            ${{ needs.setup.outputs.prefix }}-${{ github.ref_name }}-${{ matrix.suffix }}.tar.gz.sha256

  release:
    name: Publish GitHub Release
    needs: [setup, build-linux, build-macos]
    # setup.result == 'success' is load-bearing: a failed setup skips the build jobs,
    # and skipped != failure would otherwise let release publish an empty Release on
    # an immutable tag. A deliberately-skipped OS job (single-OS subset) must NOT
    # cascade-skip the release, hence the != 'failure' checks rather than == 'success'.
    if: >-
      ${{ !cancelled() && needs.setup.result == 'success'
      && needs.build-linux.result != 'failure'
      && needs.build-macos.result != 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download tarballs
        # No pattern: every artifact this run produced is a per-target tarball (the
        # only foreign artifact, the old image-binary, was removed). Downloading all
        # by default lands each under dist/<name>/, so names cannot collide.
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
      - name: Create Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: 'dist/**'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
